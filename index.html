            color: var(--text-dark);

        }

        .nav {

        }

        .nav.scrolled {

        }

            justify-content: space-between;

        .nav-link:hover {

        .nav-link::after {

            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {

            font-weight: 600;
            transition: var(--transition);
            display: inline-block;

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

            top: -50%;

            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: rotate(0deg); }
            33% { transform: rotate(120deg); }
            66% { transform: rotate(240deg); }
        }

            font-weight: 600;

            transition: var(--transition);
        }

        .btn-secondary:hover {

            color: var(--primary-color);
        }

        .portfolio-item:hover {

            box-shadow: var(--shadow-lg);
        }

        .portfolio-image {
            width: 100%;
            height: 250px;
            object-fit: cover;

        .portfolio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;

            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .portfolio-overlay {

        }

        .portfolio-content {

            padding: 2rem;
        }

        .portfolio-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .portfolio-category {
            color: var(--primary-color);
            font-size: 0.9rem;

        .portfolio-badge {

        }

            display: flex;
            align-items: center;
            gap: 1rem;
        }
